name = "dovecot"
compatibility_date = "2026-03-30"
send_metrics = false
main = "build/worker/shim.mjs"

[[routes]]
pattern = "dashboard.pigiot.net"
custom_domain = true
zone_name = "pigiot.net"

# [assets]
# directory = "./loft/target/dx/loft/release/web/public"
# binding = "ASSETS"
# not_found_handling = "single-page-application"
# run_worker_first = ["/api/*", "/flocks/*"]

[build]
# command = "( cd ./loft && ./build.sh ) && cargo install -q worker-build && worker-build --release"
command = "cargo install -q worker-build && worker-build --release"
watch_dir = ["./src"]

[observability.logs]
enabled = true

[durable_objects]
# the `class_name` uses the Rust struct identifier name
bindings = [
  { name = "FLOCKS", class_name = "Flocks" },
  { name = "PIGEONS", class_name = "Pigeons" },
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Flocks", "Pigeons"]
