name = "thingspace-sdk"
compatibility_date = "2026-02-23"
send_metrics = false
# upload_source_maps = true
main = "build/worker/shim.mjs"

[assets]
directory = "../dioxus/target/dx/web-client/release/web/public"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/vzw*", "/connect*"]

[build]
command = "( cd ../dioxus && ./build.sh ) && cargo install -q worker-build && worker-build --release"
watch_dir = ["./src"]

[observability.logs]
enabled = true

[[kv_namespaces]]
binding = "THINGSPACE"
id = "c009b0bea73e44db9aec38e114496717"

[durable_objects]
# the `class_name` uses the Rust struct identifier name
bindings = [
  { name = "PIGEON", class_name = "Pigeon" },
  { name = "NIDDMESSAGES", class_name = "NiddMessages" },
]

[[migrations]]
tag = "v2"                                      # Should be unique for each entry
new_sqlite_classes = ["Pigeon", "NiddMessages"] # Array of new classes
